# Server Configuration
server.port=8082
server.servlet.context-path=/api

# MySQL Configuration (comentado - usar H2 por defecto)
# spring.datasource.url=jdbc:mysql://localhost:3306/sistema_reservas?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
# spring.datasource.username=root
